name: Build Linux

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: swift-actions/setup-swift@v2.3.0
      with:
        swift-version: "6.2"
    - uses: actions/checkout@v4
    - name: Build
      run: swift build
